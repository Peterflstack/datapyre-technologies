<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blog Posts — Datapyre Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:#0a1733; --ink-soft:#112248; --ink-line:#20335c;
    --paper:#eaf0fb; --accent:#2e8bff; --accent-bright:#2ca6f9;
    --gold:#e18e26; --muted:#8ea0c0; --radius:14px;
    --danger:#e53935; --success:#00c87a; --sidebar-w:240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Afacad', sans-serif; background: var(--ink); color: var(--paper); min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  h1,h2,h3 { font-family: 'Jost', sans-serif; font-weight: 700; }

  .sidebar { position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--ink-soft);border-right:1px solid var(--ink-line);display:flex;flex-direction:column;z-index:100;transition:transform .3s ease; }
  .sidebar-logo { padding:22px 20px;border-bottom:1px solid var(--ink-line);display:flex;align-items:center;gap:10px; }
  .logo-mark { width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Jost';font-weight:800;font-size:16px;color:#061634;flex-shrink:0; }
  .logo-text { font-family:'Jost';font-size:16px;font-weight:700; }
  .logo-text span { display:block;font-size:10px;color:var(--muted);font-family:'Afacad';font-weight:400;margin-top:1px; }
  .sidebar-nav { flex:1;padding:16px 0;overflow-y:auto; }
  .nav-section { padding:0 16px;margin-bottom:4px; }
  .nav-label { font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:rgba(142,160,192,.5);padding:8px 8px 4px; }
  .nav-item { display:flex;align-items:center;gap:11px;padding:10px 8px;border-radius:9px;font-size:14px;color:var(--muted);transition:all .2s;cursor:pointer;margin-bottom:2px; }
  .nav-item:hover { color:var(--paper);background:rgba(255,255,255,.05); }
  .nav-item.active { color:var(--paper);background:rgba(46,139,255,.12); }
  .nav-item.active svg { color:var(--accent); }
  .nav-item svg { width:17px;height:17px;flex-shrink:0; }
  .sidebar-footer { padding:16px;border-top:1px solid var(--ink-line); }
  .view-site { display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:9px;font-size:13px;color:var(--muted);transition:all .2s; }
  .view-site:hover { color:var(--paper);background:rgba(255,255,255,.05); }
  .layout { display:flex;min-height:100vh; }
  .main { margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh; }
  .topbar { height:62px;background:var(--ink-soft);border-bottom:1px solid var(--ink-line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50; }
  .topbar-left { display:flex;align-items:center;gap:12px; }
  .menu-btn { display:none;background:none;border:none;color:var(--paper);cursor:pointer; }
  .topbar-title { font-family:'Jost';font-size:18px;font-weight:700; }
  .topbar-right { display:flex;align-items:center;gap:16px; }
  .user-chip { display:flex;align-items:center;gap:10px;font-size:14px; }
  .avatar { width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Jost';font-weight:700;font-size:14px;color:#061634; }
  .logout-btn { padding:7px 14px;border-radius:7px;background:transparent;border:1px solid var(--ink-line);color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Afacad'; }
  .logout-btn:hover { border-color:var(--danger);color:var(--danger); }
  .content { padding:28px;flex:1; }
  .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px; }
  .page-header h2 { font-size:22px; }
  .btn { display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;font-family:'Afacad';font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s; }
  .btn-primary { background:var(--accent);color:#061634; }
  .btn-primary:hover { background:var(--accent-bright);transform:translateY(-2px); }
  .btn-ghost { background:transparent;color:var(--paper);border:1px solid var(--ink-line); }
  .btn-ghost:hover { border-color:var(--accent);color:var(--accent); }
  .btn-danger { background:transparent;color:var(--danger);border:1px solid rgba(229,57,53,.3);font-size:13px;padding:6px 12px; }
  .btn-danger:hover { background:rgba(229,57,53,.1); }
  .btn-sm { padding:5px 12px;font-size:12px;border-radius:6px; }
  .toolbar { display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center; }
  .search-wrap { position:relative;flex:1;min-width:200px; }
  .search-wrap svg { position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted); }
  .search-wrap input { width:100%;padding:9px 12px 9px 38px;background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:8px;color:var(--paper);font-family:'Afacad';font-size:14px; }
  .search-wrap input:focus { outline:none;border-color:var(--accent); }
  .search-wrap input::placeholder { color:rgba(142,160,192,.5); }
  select.filter { padding:9px 14px;background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:8px;color:var(--paper);font-family:'Afacad';font-size:14px;cursor:pointer; }
  select.filter:focus { outline:none;border-color:var(--accent); }
  .table-card { background:var(--ink-soft);border:1px solid var(--ink-line);border-radius:var(--radius);overflow:hidden; }
  table { width:100%;border-collapse:collapse; }
  th { padding:11px 20px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--ink-line);white-space:nowrap; }
  td { padding:14px 20px;font-size:14px;border-bottom:1px solid rgba(32,51,92,.4);vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.015); }
  .badge { display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em; }
  .badge-green { background:rgba(0,200,122,.12);color:var(--success); }
  .badge-gold { background:rgba(194,125,40,.12);color:var(--gold); }
  .badge-gray { background:rgba(142,160,192,.1);color:var(--muted); }
  .action-group { display:flex;gap:6px;align-items:center; }
  .act-btn { padding:5px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--ink-line);background:transparent;color:var(--muted);font-family:'Afacad';transition:all .2s; }
  .act-btn:hover { border-color:var(--accent);color:var(--accent); }
  .act-btn.danger:hover { border-color:var(--danger);color:var(--danger); }
  .act-btn.success { border-color:rgba(0,200,122,.3);color:var(--success); }
  .act-btn.success:hover { background:rgba(0,200,122,.1); }
  .pagination { display:flex;align-items:center;gap:8px;padding:16px 20px;border-top:1px solid var(--ink-line);justify-content:flex-end; }
  .page-info { font-size:13px;color:var(--muted);margin-right:auto; }
  .page-btn { width:32px;height:32px;border-radius:6px;border:1px solid var(--ink-line);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Afacad'; }
  .page-btn:hover,.page-btn.active { background:var(--accent);border-color:var(--accent);color:#061634; }
  .page-btn:disabled { opacity:.4;cursor:not-allowed; }
  .empty-state { text-align:center;padding:60px 20px;color:var(--muted); }
  .empty-state p { margin-bottom:16px; }
  .skeleton { background:linear-gradient(90deg,var(--ink-line) 25%,rgba(32,51,92,.7) 50%,var(--ink-line) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px; }
  @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
  .toast-container { position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:10px; }
  .toast { padding:12px 18px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;max-width:320px; }
  .toast-success { background:rgba(0,200,122,.12);border:1px solid rgba(0,200,122,.3);color:var(--success); }
  .toast-error { background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.3);color:#e57373; }
  @keyframes toastIn { from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)} }
  @media(max-width:768px) { .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0);box-shadow:0 0 0 100vw rgba(0,0,0,.5)} .main{margin-left:0} .menu-btn{display:flex;align-items:center} .content{padding:16px} }
</style>
</head>

<div class="main">

  <div class="content">

      <a href="editor.html" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>

        <option value="">All statuses</option>
        <option value="published">Published</option>

      </select>
      <select class="filter" id="category-filter" onchange="filterPosts()">
        <option value="">All categories</option>
        <option value="Performance Advertising">Performance Advertising</option>
        <option value="Web Development">Web Development</option>
        <option value="AI & Automation">AI & Automation</option>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const session = JSON.parse(localStorage.getItem('cs_admin_session'));
  if (!session) window.location.replace('index.html');
  document.getElementById('user-name').textContent = session?.name || 'Admin';
  document.getElementById('user-avatar').textContent = (session?.name||'A').charAt(0).toUpperCase();

  const db = supabase.createClient('https://hyfotqpttdgznfjzppvc.supabase.co','sb_publishable_2lN1e_eazz1G5_DAHuiAOQ_oLBfQpcZ');

  const PAGE_SIZE = 15;
  let currentPage = 1;
  let allPosts = [];
  let filtered = [];

  function logout() { localStorage.removeItem('cs_admin_session'); window.location.replace('index.html'); }

  function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }

  function toast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function filterPosts() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const status = document.getElementById('status-filter').value;
    const cat = document.getElementById('category-filter').value;
    filtered = allPosts.filter(p => {
      const matchQ = !q || p.title.toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q);
      const matchS = !status || p.status === status;
      const matchC = !cat || p.category === cat;
      return matchQ && matchS && matchC;
    });
    currentPage = 1;
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('posts-body');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:48px">No posts found. <a href="editor.html" style="color:var(--accent)">Create your first post →</a></td></tr>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = page.map(p => `
      <tr>
        <td style="font-weight:600;max-width:260px">
          <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.title}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">
            ${p.status==='published'
              ? `<a href="../blog-post.html?slug=${encodeURIComponent(p.slug)}" target="_blank" style="color:var(--accent);text-decoration:none" title="Preview post">/blog/${p.slug} ↗</a>`
              : `/blog/${p.slug}`}
          </div>
        </td>
        <td><span style="font-size:12px;color:var(--muted)">${p.category || '—'}</span></td>
        <td><span class="badge ${p.status==='published'?'badge-green':'badge-gold'}">${p.status}</span></td>
        <td style="color:var(--muted);font-size:13px">${fmtDate(p.created_at)}</td>
        <td>
          <div class="action-group">
            <a href="editor.html?id=${p.id}" class="act-btn">Edit</a>
            <button class="act-btn ${p.status==='published'?'':'success'}" onclick="toggleStatus('${p.id}','${p.status}')">${p.status==='published'?'Unpublish':'Publish'}</button>
            <button class="act-btn danger" onclick="deletePost('${p.id}','${p.title}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');

    renderPagination();
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    const pag = document.getElementById('pagination');
    if (total <= 1) { pag.innerHTML = ''; return; }

    let html = `<span class="page-info">${filtered.length} posts</span>`;
    html += `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i=1;i<=total;i++) {
      if (i===1||i===total||Math.abs(i-currentPage)<=1) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i-currentPage)===2) {
        html += `<span style="color:var(--muted)">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    pag.innerHTML = html;
  }

  function goPage(n) {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    if (n < 1 || n > total) return;
    currentPage = n;
    renderTable();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  async function toggleStatus(id, current) {
    const newStatus = current === 'published' ? 'draft' : 'published';
    const { error } = await db.from('posts').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', id);
    if (error) { toast('Failed to update status', 'error'); return; }
    const post = allPosts.find(p => p.id === id);
    if (post) post.status = newStatus;
    filterPosts();
    toast(`Post ${newStatus === 'published' ? 'published' : 'unpublished'} successfully`);
  }

  async function deletePost(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    const { error } = await db.from('posts').delete().eq('id', id);
    if (error) { toast('Delete failed', 'error'); return; }
    allPosts = allPosts.filter(p => p.id !== id);
    filterPosts();
    toast('Post deleted');
  }

  async function loadPosts() {
    const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
    if (error) { toast('Failed to load posts', 'error'); return; }
    allPosts = data || [];
    filtered = [...allPosts];
    renderTable();
  }

  loadPosts();
</script>
</body>
</html>
